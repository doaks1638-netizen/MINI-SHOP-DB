services:
  db:
    image: postgres:16.4
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 3
  web:
    build:
      context: .
      dockerfile: ./backend/Dockerfile.test
    depends_on:
      # старт только когда запустилась бд
      db:
        condition: service_healthy
    command: uv run pytest -sv --cov=app tests/ --cov-report=html
