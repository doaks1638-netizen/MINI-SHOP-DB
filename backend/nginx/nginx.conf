upstream fastapi_ecommerce {
    server web:8000;
}

upstream vite_frontend {
    server frontend:3000;
}

limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

server {
    listen 443 ssl;
    server_name minishopdb.mooo.com;

    sendfile on;
    client_max_body_size 10m; # без этого nginx режет загрузку файлов на 1 МБ

    # Включаем сжатие
    gzip on;
    gzip_vary on; # Добавляет заголовок Vary: Accept-Encoding для кэш-серверов
    gzip_proxied any; # Разрешает сжимать проксированные запросы от FastAPI/Vite

    gzip_comp_level 5; # Оптимальный баланс сжатия и нагрузки на CPU
    gzip_min_length 256; # Файлы меньше 256 байт не сжимаем

    # Указываем типы данных, которые нужно сжимать (JSON и фронтенд-сборка)
    gzip_types
    application/javascript
    application/json
    application/xml
    text/css
    text/plain
    text/javascript
    image/svg+xml;

    # Эти строки НУЖНЫ! Образ jonasal/nginx-certbot сканирует ssl_certificate_key
    # чтобы понять, какой cert-name использовать и для каких server_name запросить сертификат.
    # "minishopdb.mooo.com" — это cert-name, совпадает с доменом для простоты.
    ssl_certificate /etc/letsencrypt/live/minishopdb.mooo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minishopdb.mooo.com/privkey.pem;

    # Рекомендуемые SSL-настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Глобальные заголовки для проксирования
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Expect "";

    # Все запросы к интерфейсу идут на Vite
    location / {
        proxy_pass http://vite_frontend;
        # Поддержка вебсокетов для Vite hot-reload
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ~ ^/google/login {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://vite_frontend;
        # Поддержка вебсокетов для Vite hot-reload
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Все запросы к бэкенду уходят на FastAPI
    location ~ ^/(api|docs|redoc|openapi.json) {
        proxy_pass http://fastapi_ecommerce;
        proxy_redirect off;
    }

    location ^~ /media/ {
        alias /var/www/media/;
    }
    location /pgadmin/ {
        proxy_pass http://pgadmin:80;
        proxy_set_header X-Script-Name /pgadmin;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
}
