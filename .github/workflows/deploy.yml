name: CI/CD Pipeline (CI on develop, CD on main)

on:
  push:
    branches: [ "main", "develop" ]

jobs:
  # --- ЭТАП CI: ПРОГОН ТЕСТОВ ---
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # НАШ НОВЫЙ ШАГ: Создаем пустой файл-пустышку, чтобы Dockerfile не падал
      - name: Create dummy .env.test
        run: touch .env.test

      # Этот шаг остался без изменений
      - name: Run Tests in Docker
        run: |
          docker compose -f docker-compose.test.yml up --build --abort-on-container-exit

  # --- ЭТАП CD: ДЕПЛОЙ НА VPS (Только для ветки main) ---
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref_name == 'main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.SERVER_USER }} # Сюда подставится alex
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Переходим в твою домашнюю папку проекта
            mkdir -p /home/alex/MINI_SHOP_DB
            cd /home/alex/MINI_SHOP_DB
            
            # Клонируем или обновляем репо
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            fi
            
            git fetch --all
            git checkout main
            git pull origin main
            
            # Перезапускаем продакшн
            docker compose up --build -d