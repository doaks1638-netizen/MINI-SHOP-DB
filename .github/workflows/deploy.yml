name: CI/CD Pipeline (CI on develop, CD on main)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # --- ЭТАП CI: ПРОГОН ТЕСТОВ ---
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Tests in Docker
        run: |
          docker compose --env-file .env.test -f docker-compose.test.yml up --build --abort-on-container-exit

  # --- ЭТАП CD: ДЕПЛОЙ НА VPS (Только для ветки main) ---
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref_name == 'main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash -c '
              cd /home/alex/MINI_SHOP_DB
              docker compose down 
              git fetch --all
              git checkout main
              git pull origin main
              
              docker compose up --build -d
            '