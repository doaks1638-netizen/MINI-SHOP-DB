name: CI/CD Pipeline (CI on develop, CD on main)

on:
  push:
    branches: [ "main", "develop" ]

jobs:
  # --- ЭТАП CI: ПРОГОН ТЕСТОВ ---
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Tests in Docker
        run: |
          docker compose --env-file .env.test -f docker-compose.test.yml up --build --abort-on-container-exit

  # --- ЭТАП CD: ДЕПЛОЙ НА VPS (Только для ветки main) ---
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref_name == 'main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash -c '
              mkdir -p /home/alex/MINI_SHOP_DB
              cd /home/alex/MINI_SHOP_DB
              
              # Stop and remove old/conflicting containers before pulling new code
              docker compose down || true
              docker rm -f vite_frontend postgres_db pgadmin_ui || true
              
              # Stop any containers using ports 80 or 443 to avoid port conflicts
              CONTAINERS_80=$(docker ps -aq --filter publish=80)
              if [ -n "$CONTAINERS_80" ]; then
                docker rm -f $CONTAINERS_80
              fi
              CONTAINERS_443=$(docker ps -aq --filter publish=443)
              if [ -n "$CONTAINERS_443" ]; then
                docker rm -f $CONTAINERS_443
              fi
              
              # Stop system services if they are blocking ports 80/443
              sudo systemctl stop nginx 2>/dev/null || true
              sudo systemctl stop apache2 2>/dev/null || true
              
              if [ ! -d ".git" ]; then
                git clone https://github.com/${{ github.repository }}.git .
              fi
              
              git fetch --all
              git checkout main
              git pull origin main
              
              docker compose up --build -d
            '