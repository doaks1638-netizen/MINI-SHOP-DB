upstream fastapi_ecommerce {
    server web:8000;
}

upstream vite_frontend {
    # Внимание: Vite по умолчанию использует 5173.
    server frontend:3000;
}

server {
    listen 443 ssl;
    server_name minishopdb.mooo.com;

    # Оптимизируем передачу файлов
    sendfile on;

    # Указываем пути к сертификатам именно для вашего домена
    ssl_certificate /etc/letsencrypt/live/minishopdb.mooo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minishopdb.mooo.com/privkey.pem;

    # Глобальные заголовки для проксирования
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        allow all;
    }

    # Все запросы к интерфейсу идут на Vite
    location / {
        proxy_pass http://vite_frontend;
        # Важно для Vite: поддержка вебсокетов (чтобы работал hot-reload в браузере)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Все запросы к бэкенду уходят на FastAPI
    location ~ ^/(api|docs|redoc|openapi.json) {
        proxy_pass http://fastapi_ecommerce;
        proxy_redirect off;
    }

    location /media/ {
        alias /var/www/media/;
    }
}